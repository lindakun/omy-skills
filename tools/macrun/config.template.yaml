# macrun 配置模板（macOS 桌面自动化）
# 复制为 config.local.yaml 后填入 API Key（*.local.yaml 已被 gitignore）

llm:
  api_type: openai
  api_base: https://ark.cn-beijing.volces.com/api/v3
  api_key: YOUR_VOLC_ARK_API_KEY
  model: doubao-seed-2-1-turbo-260628
  temperature: 0.1
  max_tokens: 1200
  # 纯文本步超时；带截图的视觉步用 vision_timeout（截图上传更慢）
  timeout: 30
  vision_timeout: 90

agent:
  max_steps: 20
  # AX 为主；仅在步骤失败、控件树为空或显式要求时截图
  screenshot_on_failure: true
  screenshot_when_tree_empty: true
  # 微信等稀疏 AX：不要每步都截图（易触发视觉超时），仅首步/失败/每 N 步
  sparse_ax_screenshot_every: 3
  screenshot_max_side: 1280
  screenshot_jpeg_quality: 55
  ax_max_nodes: 80
  ax_max_depth: 6
  step_delay: 0.35

# 微信：备注后缀脚本选人 + 可选视觉（发送/读消息）
wechat:
  # —— 备注后缀唯一定位（选人不用视觉）——
  # 口语名 LvLLM → 搜索 LvLLM-1688；请在微信把联系人/群备注统一加此后缀
  remark_suffix: "-1688"
  remark_suffix_enabled: true
  # 无法改备注的系统会话（精确匹配，不拼后缀）
  no_suffix_sessions:
    - 文件传输助手
  # 后缀搜索后如何打开第 1 条：enter（更快）| down_enter（部分版本更稳）
  select_mode: enter

  # 发送键：enter（本机「Enter 发送」，推荐）| cmd_enter（「⌘Enter 发送」）
  # both 会在 Enter 模式下先 Cmd+Enter 插入换行，不推荐
  send_mode: enter
  # 选人后 Esc+点击底部输入带，避免正文粘进搜索框
  focus_input: true
  input_click_x_ratio: 0.58
  input_click_bottom_inset: 70
  # 剪贴板探测：粘贴后正文是否在输入框、发送后输入框是否清空（不调视觉）
  verify_send: true
  # 仅失败时截微信窗口到本地（成功路径不加时延）
  fail_screenshot: true
  fail_screenshot_path: /tmp/wechat_send_fail.jpg
  # 默认全流程不调视觉。调试才开：
  # gates:
  #   send: true
  gate_timeout: 90
  gate_max_side: 720
  gate_jpeg_quality: 40
  search_hotkey: [cmd, f]
  # 各阶段等待（秒）
  open_sleep: 0.35
  search_sleep: 0.28
  after_contact_sleep: 0.40
  after_select_sleep: 0.45
  after_message_sleep: 0.22
  # 读消息：只截图落盘，不调视觉；默认缩放+JPEG 便于人工看、体积小
  # 读消息截图目录；文件名 wechat_screenshot_{会话}_{YYYYMMDD_HHMMSS}.jpg
  read_screenshot_dir: /tmp
  # 可选模板（优先于 dir）：/tmp/wechat_screenshot_{session}_{time}.jpg
  # read_screenshot_path: /tmp/wechat_screenshot_{session}_{time}.jpg
  read_screenshot_compress: true
  read_screenshot_max_side: 1600   # 最长边像素；0=不缩放
  read_screenshot_jpeg_quality: 80 # 1-100，人工阅读建议 75-85
  # 截图前是否轻微上滚（默认 false，更快）
  read_scroll_once: false

safety:
  # 命中这些词时拒绝执行（可继续扩展）
  blocked_phrases:
    - empty trash
    - 清空废纸篓
    - format disk
    - 抹掉
    - erase
    - sudo rm
