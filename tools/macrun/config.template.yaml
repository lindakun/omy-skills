# macrun 配置模板（macOS 桌面自动化）
# 复制为 config.local.yaml 后填入 API Key（*.local.yaml 已被 gitignore）

llm:
  api_type: openai
  api_base: https://ark.cn-beijing.volces.com/api/v3
  api_key: YOUR_VOLC_ARK_API_KEY
  model: doubao-seed-2-1-turbo-260628
  temperature: 0.1
  max_tokens: 1200
  # 纯文本步超时；带截图的视觉步用 vision_timeout（截图上传更慢）
  timeout: 30
  vision_timeout: 90

agent:
  max_steps: 20
  # AX 为主；仅在步骤失败、控件树为空或显式要求时截图
  screenshot_on_failure: true
  screenshot_when_tree_empty: true
  # 微信等稀疏 AX：不要每步都截图（易触发视觉超时），仅首步/失败/每 N 步
  sparse_ax_screenshot_every: 3
  screenshot_max_side: 1280
  screenshot_jpeg_quality: 55
  ax_max_nodes: 80
  ax_max_depth: 6
  step_delay: 0.35

# 微信：脚本推进 + 关卡式视觉（Gate1 选人 / Gate2 发送校验）
wechat:
  # 发送键：both | enter | cmd_enter
  send_mode: both
  # 是否启用视觉 Gate（失败直接 FAIL，不盲进）
  gates_enabled: true
  # Gate 视觉超时/压缩（独立于通用 agent 截图，避免过慢）
  gate_timeout: 60
  gate_max_side: 960
  gate_jpeg_quality: 45
  search_hotkey: [cmd, f]
  # 各阶段等待（秒）
  open_sleep: 0.35
  search_sleep: 0.35
  after_contact_sleep: 0.35
  after_select_sleep: 0.45
  after_message_sleep: 0.25

safety:
  # 命中这些词时拒绝执行（可继续扩展）
  blocked_phrases:
    - empty trash
    - 清空废纸篓
    - format disk
    - 抹掉
    - erase
    - sudo rm
