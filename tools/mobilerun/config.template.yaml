# -*- yaml -*-
# config.template.yaml
# 主机 OS 无关 — 控制 Android 设备（macOS / Windows / Linux 通用）
#
# 用法：
#   1. 复制为 config.local.yaml（已被仓库 *.local.yaml 忽略，勿提交含真实 Key 的文件）
#   2. 替换 YOUR_VOLC_ARK_API_KEY / YOUR_ADB_SERIAL
#   3. export MOBILERUN_CONFIG=/path/to/omy-skills/tools/mobilerun/config.local.yaml
#   或：mobilerun run -c /path/to/config.local.yaml "goal"
#
# 切换视觉模型：修改 _active_vision_model 中的 <<: *xxx
# 切换文本模型：修改 _active_text_model 中的 <<: *xxx
# 切换设备：修改 _active_device 中的 <<: *xxx

_version: 6

# ==== 模型预配置 ====
_models:
  doubao_turbo: &doubao_turbo
    provider: OpenAILike
    model: doubao-seed-2-1-turbo-260628
    api_base: https://ark.cn-beijing.volces.com/api/v3
    kwargs:
      api_key: YOUR_VOLC_ARK_API_KEY  # TODO: 替换为你的火山引擎 API Key
  doubao_lite: &doubao_lite
    provider: OpenAILike
    model: doubao-seed-2-0-lite-260428
    api_base: https://ark.cn-beijing.volces.com/api/v3
    kwargs:
      api_key: YOUR_VOLC_ARK_API_KEY  # TODO: 替换为你的火山引擎 API Key
  gpt4o: &gpt4o
    provider: OpenAILike
    model: gpt-4o-mini
    api_base: https://api.openai.com/v1
    kwargs:
      api_key: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  deepseek: &deepseek
    provider: OpenAILike
    model: deepseek-chat
    api_base: https://api.deepseek.com/v1
    kwargs:
      api_key: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  qwen: &qwen
    provider: OpenAILike
    model: qwen-plus
    api_base: https://dashscope.aliyun.com/compatible-mode/v1
    kwargs:
      api_key: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  longcat: &longcat
    provider: OpenAILike
    model: LongCat-2.0
    api_base: https://api.longcat.chat/openai
    kwargs:
      api_key: YOUR_LONGCAT_API_KEY  # TODO: 替换为你的 LongCat API Key

# ==== 设备预配置 ====
# serial 请改成 `adb devices` 输出中的设备号；模拟器用 emulator-5554
_devices:
  android_emulator: &android_emulator
    serial: emulator-5554
    platform: android
    auto_setup: true
  android_usb: &android_usb
    serial: YOUR_ADB_SERIAL  # TODO: 替换为真机序列号，例如 R5CTxxxx
    platform: android
    auto_setup: true

# ===============================================================
# 当前使用的模型 - 修改下面两行来切换
# 视觉模型可选：*doubao_turbo | *doubao_lite | *gpt4o | *deepseek | *qwen
# 文本模型可选：*longcat | *doubao_turbo | *doubao_lite | *gpt4o | *deepseek | *qwen
# 若未配置 LongCat，可将 _active_text_model 改为 *doubao_lite
# ===============================================================
_active_vision_model: &active_vision_model
  <<: *doubao_lite
_active_text_model: &active_text_model
  <<: *doubao_lite

# ================================================================
# 当前使用的设备：*android_usb（真机）或 *android_emulator（模拟器）
# ===============================================================
_active_device: &active_device
  <<: *android_usb

agent:
  max_steps: 30
  reasoning: false
  streaming: true
  vision_only: false
  after_sleep_action: 0.3
  wait_for_stable_ui: 0.3
  use_normalized_coordinates: false
  fast_agent:
    vision: true
    parallel_tools: true
    system_prompt: config/prompts/fast_agent/system.jinja2
    user_prompt: config/prompts/fast_agent/user.jinja2
  manager:
    vision: true
    system_prompt: config/prompts/manager/system.jinja2
    stateless: false
  executor:
    vision: true
    system_prompt: config/prompts/executor/system.jinja2
  app_cards:
    enabled: true
    mode: local
    app_cards_dir: config/app_cards

llm_profiles:
  manager:
    <<: *active_text_model
    temperature: 0.2
  executor:
    <<: *active_vision_model
    temperature: 0.1
  fast_agent:
    <<: *active_vision_model
    temperature: 0.2
  app_opener:
    <<: *active_text_model
    temperature: 0.0
  structured_output:
    <<: *active_text_model
    temperature: 0.0

device:
  <<: *active_device

telemetry:
  enabled: false
tracing:
  enabled: false
logging:
  debug: false
  save_trajectory: none
  trajectory_path: trajectories
  trajectory_gifs: false
  rich_text: false
tools:
  disabled_tools: null
  stealth: false
credentials:
  enabled: false
mcp:
  enabled: false
